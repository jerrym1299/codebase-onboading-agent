services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codebase_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:latest
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8080:8080"
    networks:
      - backend

  fastapi:
    build:
      context: .
      dockerfile: dockerfile
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      temporal:
        condition: service_healthy
    ports:
      - "8001:8000"
    environment:
      - TEMPORAL_HOST=temporal:7233
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/codebase_agent
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY:-}
      - GITHUB_APP_PRIVATE_KEY_BASE64=${GITHUB_APP_PRIVATE_KEY_BASE64:-}
      - GITHUB_API_BASE_URL=${GITHUB_API_BASE_URL:-}
      - DAYTONA_API_KEY=${DAYTONA_API_KEY}
      - DAYTONA_JWT_TOKEN=${DAYTONA_JWT_TOKEN}
      - DAYTONA_ORGANIZATION_ID=${DAYTONA_ORGANIZATION_ID}
      - DAYTONA_API_URL=${DAYTONA_API_URL}
      - SANDBOX_RUNNER_PROVIDER=${SANDBOX_RUNNER_PROVIDER:-local}
      - DAYTONA_SANDBOX_BASE_IMAGE=${DAYTONA_SANDBOX_BASE_IMAGE:-mcr.microsoft.com/playwright:v1.51.1-noble}
      - DAYTONA_SANDBOX_AUTO_STOP_MINUTES=${DAYTONA_SANDBOX_AUTO_STOP_MINUTES:-60}
      - DAYTONA_SANDBOX_AUTO_ARCHIVE_MINUTES=${DAYTONA_SANDBOX_AUTO_ARCHIVE_MINUTES:-1440}
      - DAYTONA_SANDBOX_AUTO_DELETE_MINUTES=${DAYTONA_SANDBOX_AUTO_DELETE_MINUTES:--1}
      - DAYTONA_SANDBOX_PREVIEW_PORT=${DAYTONA_SANDBOX_PREVIEW_PORT}
      - VERIFY_SANDBOX_IMAGE=hobbes-verify-sidecar:latest
      - VERIFY_MAX_TURNS=400
      - VERIFY_BUDGET_SECONDS=1200
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - backend

  index-worker:
    build:
      context: .
      dockerfile: dockerfile
    restart: unless-stopped
    command: python -m workers.index_worker --poll-seconds ${INDEX_WORKER_POLL_SECONDS:-5}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/codebase_agent
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY:-}
      - GITHUB_APP_PRIVATE_KEY_BASE64=${GITHUB_APP_PRIVATE_KEY_BASE64:-}
      - GITHUB_API_BASE_URL=${GITHUB_API_BASE_URL:-}
    volumes:
      - .:/app
      - repo_workdirs:/repos
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  repo_workdirs:
